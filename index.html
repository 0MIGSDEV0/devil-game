<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVIL PLATFORM</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #c00;
            font-family: 'Consolas', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border: 4px solid #400;
            image-rendering: pixelated;
            box-shadow: 0 0 30px #800;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 22px;
            text-shadow: 0 0 10px #f00;
        }
        #title {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #f00;
            pointer-events: none;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: #f00;
            text-shadow: 0 0 20px #f00;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="game" width="1280" height="720"></canvas>
    
    <div id="hud">MORTES: <span id="deaths">0</span></div>
    <div id="title">DEVIL PLATFORM</div>
    <div id="game-over">
        VOCÊ MORREU<br>
        <span style="font-size:28px">Pressione R para tentar novamente</span>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const deathsEl = document.getElementById('deaths');
        const gameOverScreen = document.getElementById('game-over');

        let deaths = 0;
        let gameState = 'playing'; // playing, dead

        // Jogador
        let player = {
            x: 100,
            y: 400,
            width: 28,
            height: 28,
            velX: 0,
            velY: 0,
            speed: 7,
            jumpPower: -16,
            onGround: false,
            jumps: 2
        };

        // Teclas
        const keys = {};

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if ((e.key === 'r' || e.key === 'R') && gameState === 'dead') resetLevel();
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        // Nível (Level 1)
        let platforms = [
            {x: 0, y: 650, w: 800, h: 70},
            {x: 900, y: 650, w: 400, h: 70},
            {x: 300, y: 500, w: 200, h: 20},
            {x: 600, y: 380, w: 150, h: 20},
            {x: 850, y: 280, w: 180, h: 20, temp: true, timer: 90} // plataforma temporária
        ];

        let spikes = [
            {x: 400, y: 630, w: 40, h: 20},
            {x: 800, y: 630, w: 40, h: 20},
            {x: 1000, y: 630, w: 40, h: 20}
        ];

        let key = {x: 920, y: 200, w: 25, h: 35, collected: false};
        let hasKey = false;

        function resetLevel() {
            player.x = 100;
            player.y = 400;
            player.velX = 0;
            player.velY = 0;
            player.jumps = 2;
            hasKey = false;
            key.collected = false;
            gameState = 'playing';
            gameOverScreen.style.display = 'none';
        }

        function update() {
            if (gameState !== 'playing') return;

            // Movimento horizontal
            player.velX = 0;
            if (keys['a'] || keys['A'] || keys['ArrowLeft']) player.velX = -player.speed;
            if (keys['d'] || keys['D'] || keys['ArrowRight']) player.velX = player.speed;

            // Gravidade
            player.velY += 0.8;
            if (player.velY > 15) player.velY = 15;

            // Movimento X
            player.x += player.velX;
            checkHorizontalCollisions();

            // Movimento Y
            player.y += player.velY;
            checkVerticalCollisions();

            // Pulo
            if ((keys['w'] || keys['W'] || keys[' '] || keys['ArrowUp']) && player.onGround) {
                player.velY = player.jumpPower;
                player.onGround = false;
                player.jumps = 1;
            }

            // Checar morte em espinhos
            for (let spike of spikes) {
                if (checkCollision(player, spike)) {
                    die();
                    return;
                }
            }

            // Coletar chave
            if (!hasKey && checkCollision(player, key)) {
                hasKey = true;
                key.collected = true;
            }

            // Plataformas temporárias
            for (let i = 0; i < platforms.length; i++) {
                let p = platforms[i];
                if (p.temp) {
                    p.timer--;
                    if (p.timer <= 0) {
                        platforms.splice(i, 1);
                        i--;
                    }
                }
            }
        }

        function checkHorizontalCollisions() {
            for (let p of platforms) {
                if (checkCollision(player, p)) {
                    if (player.velX > 0) player.x = p.x - player.width;
                    else if (player.velX < 0) player.x = p.x + p.w;
                }
            }
        }

        function checkVerticalCollisions() {
            player.onGround = false;
            for (let p of platforms) {
                if (checkCollision(player, p)) {
                    if (player.velY > 0) {
                        player.y = p.y - player.height;
                        player.velY = 0;
                        player.onGround = true;
                        player.jumps = 2;
                    } else if (player.velY < 0) {
                        player.y = p.y + p.h;
                        player.velY = 0;
                    }
                }
            }
        }

        function checkCollision(a, b) {
            return !(a.x + a.width < b.x || 
                     a.x > b.x + b.w || 
                     a.y + a.height < b.y || 
                     a.y > b.y + b.h);
        }

        function die() {
            deaths++;
            deathsEl.textContent = deaths;
            gameState = 'dead';
            gameOverScreen.style.display = 'block';
        }

        function draw() {
            // Fundo preto com linhas vermelhas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < canvas.width; i += 80) {
                ctx.strokeStyle = '#300';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }

            // Plataformas
            ctx.fillStyle = '#777';
            for (let p of platforms) {
                if (p.temp) ctx.fillStyle = '#555';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#777';
            }

            // Espinhos
            ctx.fillStyle = '#c00';
            for (let s of spikes) {
                ctx.fillRect(s.x, s.y, s.w, s.h);
                ctx.fillStyle = '#f44';
                ctx.beginPath();
                ctx.moveTo(s.x, s.y + s.h);
                ctx.lineTo(s.x + 10, s.y);
                ctx.lineTo(s.x + 20, s.y + s.h);
                ctx.lineTo(s.x + 30, s.y);
                ctx.lineTo(s.x + 40, s.y + s.h);
                ctx.fill();
                ctx.fillStyle = '#c00';
            }

            // Chave
            if (!hasKey) {
                ctx.fillStyle = '#ff0';
                ctx.fillRect(key.x, key.y, key.w, key.h);
                ctx.fillStyle = '#aa0';
                ctx.fillRect(key.x + 8, key.y + 5, 9, 8);
            }

            // Jogador (demônio vermelho)
            ctx.fillStyle = '#c00';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Chifres
            ctx.fillStyle = '#f66';
            ctx.beginPath();
            ctx.moveTo(player.x + 8, player.y + 5);
            ctx.lineTo(player.x + 14, player.y - 4);
            ctx.lineTo(player.x + 20, player.y + 5);
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Iniciar
        resetLevel();
        gameLoop();

        // Dica inicial
        console.log("%cDevil Platform carregado! Use A/D ou setas para mover, W/Espaço para pular. Cuidado com os espinhos!", "color:#f00; font-size:14px");
    </script>
</body>
</html>
