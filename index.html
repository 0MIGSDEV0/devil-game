<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVIL PLATFORM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #ff3333;
            font-family: 'Consolas', 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        canvas {
            border: 6px solid #660000;
            box-shadow: 0 0 40px #cc0000;
            image-rendering: pixelated;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #ff0000;
            z-index: 10;
        }
        #title {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 38px;
            letter-spacing: 8px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff0000;
            z-index: 10;
            pointer-events: none;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000;
            display: none;
            text-align: center;
            line-height: 1.2;
            z-index: 20;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #aa0000;
            text-shadow: 0 0 10px #ff0000;
        }
    </style>
</head>
<body>

    <canvas id="canvas" width="1280" height="720"></canvas>

    <div id="hud">MORTES: <span id="deathCount">0</span></div>
    <div id="title">DEVIL PLATFORM</div>
    
    <div id="game-over">
        VOCÊ FALHOU<br>
        <span style="font-size: 32px;">PRESSIONE R PARA TENTAR NOVAMENTE</span>
    </div>

    <div id="instructions">
        A/D ou ← → : Mover &nbsp;&nbsp;&nbsp; W / ESPAÇO : Pular (duplo)
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const deathCountEl = document.getElementById('deathCount');
        const gameOverScreen = document.getElementById('game-over');

        let deaths = 0;
        let gameState = 'playing'; // playing | dead

        // ====================== JOGADOR ======================
        let player = {
            x: 80,
            y: 400,
            width: 30,
            height: 30,
            velX: 0,
            velY: 0,
            speed: 6.5,
            jump: -17,
            gravity: 0.85,
            onGround: false,
            jumpsLeft: 2
        };

        // ====================== CONTROLES ======================
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if ((e.key.toLowerCase() === 'r') && gameState === 'dead') resetLevel();
        });
        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        // ====================== NÍVEL ======================
        let platforms = [
            {x: 0,   y: 650, w: 850, h: 70},     // chão esquerdo
            {x: 950, y: 650, w: 400, h: 70},     // chão direito
            {x: 280, y: 520, w: 220, h: 18},
            {x: 580, y: 410, w: 160, h: 18},
            {x: 820, y: 300, w: 200, h: 18, temp: true, timer: 85}
        ];

        let spikes = [
            {x: 380, y: 630, w: 60, h: 20},
            {x: 720, y: 630, w: 60, h: 20},
            {x: 1050, y: 630, w: 60, h: 20}
        ];

        let collectible = {
            x: 1050,
            y: 220,
            width: 28,
            height: 38,
            collected: false
        };

        function resetLevel() {
            player.x = 80;
            player.y = 400;
            player.velX = 0;
            player.velY = 0;
            player.jumpsLeft = 2;
            collectible.collected = false;
            gameState = 'playing';
            gameOverScreen.style.display = 'none';
        }

        // ====================== COLISÕES ======================
        function rectCollision(a, b) {
            return !(
                a.x + a.width < b.x ||
                a.x > b.x + b.w ||
                a.y + a.height < b.y ||
                a.y > b.y + b.h
            );
        }

        function update() {
            if (gameState !== 'playing') return;

            // Movimento horizontal
            player.velX = 0;
            if (keys['a'] || keys['arrowleft']) player.velX = -player.speed;
            if (keys['d'] || keys['arrowright']) player.velX = player.speed;

            // Gravidade
            player.velY += player.gravity;
            if (player.velY > 18) player.velY = 18;

            // Aplicar movimento X
            player.x += player.velX;
            handleHorizontalCollisions();

            // Aplicar movimento Y
            player.y += player.velY;
            handleVerticalCollisions();

            // Pulo
            if ((keys['w'] || keys[' '] || keys['arrowup']) && player.jumpsLeft > 0) {
                if (player.onGround || player.jumpsLeft === 2) {
                    player.velY = player.jump;
                    player.onGround = false;
                    player.jumpsLeft--;
                }
            }

            // Morte por espinhos
            for (let spike of spikes) {
                if (rectCollision(player, spike)) {
                    die();
                    return;
                }
            }

            // Coletar item
            if (!collectible.collected && rectCollision(player, collectible)) {
                collectible.collected = true;
            }

            // Plataformas temporárias
            for (let i = platforms.length - 1; i >= 0; i--) {
                let p = platforms[i];
                if (p.temp) {
                    p.timer--;
                    if (p.timer <= 0) platforms.splice(i, 1);
                }
            }
        }

        function handleHorizontalCollisions() {
            for (let p of platforms) {
                if (rectCollision(player, p)) {
                    if (player.velX > 0) player.x = p.x - player.width;
                    if (player.velX < 0) player.x = p.x + p.w;
                }
            }
        }

        function handleVerticalCollisions() {
            player.onGround = false;
            for (let p of platforms) {
                if (rectCollision(player, p)) {
                    if (player.velY > 0) {
                        player.y = p.y - player.height;
                        player.velY = 0;
                        player.onGround = true;
                        player.jumpsLeft = 2;
                    } else if (player.velY < 0) {
                        player.y = p.y + p.h;
                        player.velY = 0;
                    }
                }
            }
        }

        function die() {
            deaths++;
            deathCountEl.textContent = deaths;
            gameState = 'dead';
            gameOverScreen.style.display = 'block';
        }

        function drawBackground() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Linhas verticais vermelhas estilo Devil
            ctx.strokeStyle = '#330000';
            ctx.lineWidth = 3;
            for (let x = 40; x < canvas.width; x += 85) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
        }

        function draw() {
            drawBackground();

            // Plataformas
            ctx.fillStyle = '#888888';
            for (let p of platforms) {
                if (p.temp) ctx.fillStyle = '#555555';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#888888';
            }

            // Espinhos
            ctx.fillStyle = '#aa0000';
            for (let s of spikes) {
                ctx.fillRect(s.x, s.y, s.w, s.h);
                // pontas dos espinhos
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.moveTo(s.x, s.y + s.h);
                ctx.lineTo(s.x + s.w/3, s.y);
                ctx.lineTo(s.x + s.w*2/3, s.y + s.h);
                ctx.lineTo(s.x + s.w, s.y + s.h);
                ctx.fill();
                ctx.fillStyle = '#aa0000';
            }

            // Chave / Colecionável
            if (!collectible.collected) {
                ctx.fillStyle = '#ffdd00';
                ctx.fillRect(collectible.x, collectible.y, collectible.width, collectible.height);
                ctx.fillStyle = '#bb9900';
                ctx.fillRect(collectible.x + 8, collectible.y + 8, 12, 10);
            }

            // Jogador - Demônio Vermelho
            ctx.fillStyle = '#ff2222';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Chifres
            ctx.fillStyle = '#ff8888';
            ctx.beginPath();
            ctx.moveTo(player.x + 6,  player.y + 8);
            ctx.lineTo(player.x + 15, player.y - 6);
            ctx.lineTo(player.x + 24, player.y + 8);
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Iniciar o jogo
        resetLevel();
        gameLoop();

        console.log("%cDEVIL PLATFORM carregado. Boa sorte, você vai precisar.", "color:#ff3333; font-size:16px");
    </script>
</body>
</html>
